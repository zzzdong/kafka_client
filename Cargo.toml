[package]
name = "kafka_client"
version = "0.1.0"
edition = "2024"
rust-version = "1.85"

[dependencies]
# 异步运行时
tokio = { version = "1.44", features = ["full"] }
async-trait = "0.1"
futures = "0.3"

# 网络编解码
bytes = "1.11"
tokio-util = { version = "0.7", features = ["codec"] }

# TLS 支持
rustls = "0.23"
tokio-rustls = "0.26"
rustls-native-certs = "0.8"
rustls-pemfile = "2.2"

# 加密与认证
sha2 = "0.10"
hmac = "0.12"
pbkdf2 = "0.12"
base64 = "0.22"
rand = "0.9"

# 错误处理
thiserror = "2.0"

# 日志
tracing = "0.1"

# 序列化
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

# 协议派生宏
kafka_protocol_derive = { path = "kafka_protocol_derive" }

# UUID
uuid = { version = "1.0", features = ["v4"] }

[workspace]
members = [ "kafka_protocol_codegen" , "kafka_protocol_derive"]
